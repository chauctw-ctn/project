<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Giám Sát - CAWACO</title>

    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/shared/layout.css">
    <link rel="stylesheet" href="/shared/gauge.css">

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            overflow: hidden;
        }

        .page-content {
            display: flex;
            flex-direction: column;

            margin-left: var(--sidebar-width);
            margin-top: var(--header-h);

            padding: 0;
            overflow: hidden;
            background: #ffffff;

            transition: margin-left .25s ease;
        }

        body.sidebar-expanded .page-content {
            margin-left: var(--sidebar-width-expanded);
        }

        body.sidebar-hidden .page-content {
            margin-left: 0;
        }

        .title-section {
            flex: 0 0 auto;
            padding: 16px 24px;
            text-align: center;
            background: #ffffff;
            border-bottom: 1px solid #dbeafe;
            z-index: 1;
        }

        .title-section h1 {
            margin: 0;
            color: #0369a1;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .gauge-section {
            display: grid;
            grid-template-columns: repeat(6, minmax(240px, 1fr));
            gap: 10px;

            width: 100%;
            padding: 10px;

            overflow-x: auto;
            overflow-y: hidden;

            background: #ffffff;
        }

        .gauge-item {
            min-width: 240px;
            display: flex;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .page-content,
            body.sidebar-expanded .page-content,
            body.sidebar-hidden .page-content {
                margin-left: 0;
            }

            .gauge-section {
                grid-template-columns: repeat(6, minmax(220px, 1fr));
            }
        }
    </style>
</head>

<body>

    <div id="layout-container"></div>

    <main class="page-content">

        <div class="title-section">
            <h1>
                TRANG DỮ LIỆU GIẤY PHÉP - TRẠM GIÁM SÁT CẤP NƯỚC CÀ MAU
            </h1>
        </div>

        <div class="gauge-section">
            <div class="gauge-item" id="Gauge_01"></div>
            <div class="gauge-item" id="Gauge_02"></div>
            <div class="gauge-item" id="Gauge_03"></div>
            <div class="gauge-item" id="Gauge_04"></div>
            <div class="gauge-item" id="Gauge_05"></div>
            <div class="gauge-item" id="Gauge_06"></div>
        </div>

    </main>

    <script src="/shared/layout.js"></script>
    <script src="/shared/nav.js"></script>
    <script src="/shared/header.js"></script>
    <script src="/shared/gauge.js"></script>

</body>
</html>
